<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Study Cards</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f0f4ee;
        --text: #203126;
        --muted: #607062;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--text);
        background: linear-gradient(180deg, #f7faf5 0%, var(--bg) 100%);
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 32px;
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 48px);
        line-height: 0.95;
      }

      .lede {
        margin: 16px 0 0;
        font-size: 18px;
        line-height: 1.5;
        color: var(--muted);
      }

      p {
        margin: 14px 0 0;
        font-size: 18px;
        line-height: 1.5;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Study Cards</p>
      <h1>Opening Study Cards</h1>
      <p>Redirecting you to the Study Cards app to finish linking ChatGPT access.</p>
    </main>
    <script type="module" src="./src/integrations/oauth/bridge.js"></script>
  </body>
</html>
